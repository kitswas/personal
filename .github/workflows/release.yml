name: Release

on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Git ref to build from (branch, tag, or commit)"
                default: "main"
                type: string

jobs:
    check-release-tag:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.check_tag.outputs.version }}
            tag_exists: ${{ steps.check_tag.outputs.tag_exists }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - name: Read version and check tag
              id: check_tag
              run: |
                  VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
                  TAG="v${VERSION}"

                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null; then
                      TAG_EXISTS=true
                      echo "Tag ${TAG} already exists. Skipping release."
                  else
                      TAG_EXISTS=false
                      echo "Tag ${TAG} does not exist. Continuing release."
                  fi

                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag_exists=${TAG_EXISTS}" >> "$GITHUB_OUTPUT"

    lint:
        needs: [check-release-tag]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm lint
            - run: pnpm format:check

    rust-check:
        needs: [check-release-tag]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
                    libayatana-appindicator3-dev librsvg2-dev patchelf \
                    build-essential pkg-config libssl-dev
            - run: cargo fmt --all -- --check
              working-directory: src-tauri
            - run: cargo clippy --all-targets -- -D warnings
              working-directory: src-tauri

    test-unit:
        needs: [check-release-tag, lint, rust-check]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
                    libayatana-appindicator3-dev librsvg2-dev patchelf \
                    build-essential pkg-config libssl-dev
            - run: cargo test
              working-directory: src-tauri
            - run: pnpm install && pnpm test

    build:
        needs: [check-release-tag, test-unit]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-latest
                      args: ""
                    - platform: macos-latest
                      args: "--target universal-apple-darwin"
                    - platform: windows-latest
                      args: ""
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: dtolnay/rust-toolchain@stable
              with:
                  # For macOS universal binary
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - name: Install Linux system dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
                    libayatana-appindicator3-dev librsvg2-dev patchelf \
                    build-essential pkg-config libssl-dev
            - run: pnpm install
            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: v${{ needs.check-release-tag.outputs.version }}
                  releaseName: v${{ needs.check-release-tag.outputs.version }}
                  releaseBody: "See CHANGELOG.md for details."
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
